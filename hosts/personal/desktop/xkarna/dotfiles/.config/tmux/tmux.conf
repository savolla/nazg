set -g input-buffer-size 10000000
# general settings
setw -g mode-keys vi
set-window-option -g xterm-keys on # for vim
set-option -g status-keys vi
bind-key -Tcopy-mode-vi 'v' send -X begin-selection
bind-key -Tcopy-mode-vi 'y' send -X copy-pipe-and-cancel "xclip -i -sel c"
set -g mode-style bg="#a89984",fg="#282828"
unbind C-b # unbind default leader key
unbind C-d # prevent accidental window closes
set -g prefix M-o # Alt + o prefix
set-option -g history-limit 10000 # large history
set-option -g detach-on-destroy off # ability to kill session without exiting tmux
set -g default-terminal "xterm-256color"
set -as terminal-overrides ',xterm*:RGB'
setw -q -g utf8 on # utf8 support
set -g mouse on
set -g terminal-overrides 'xterm*:smcup@:rmcup@'
set -sg escape-time 10
bind R source-file ~/.config/tmux/tmux.conf # reload tmux conf
set -g status-interval 5 # Refresh 'status-left' and 'status-right' more often
bind-key -n C-u copy-mode
set -g set-clipboard on # make pasting in tmux easier
set -g display-time 4000 # Increase tmux messages display duration from 750ms to 4s
# fix for emacs ctrl+enter key not working in terminal mode tmux
set -g allow-passthrough on
set -g focus-events on # focus on events
set -g buffer-limit 50
set -g terminal-features "xterm-256color:sixel"
set -g status-style "bg=terminal"

set -g input-buffer-size 10485760 # view covert arts that are more than 1MB in rmpc

# session management
bind-key Space switch-client -l # switch previous session
bind -n C-M-p run-shell "tmux switch-client -p"  # switch to next session
bind -n C-M-n run-shell "tmux switch-client -n"  # switch to prev session
bind-key -n C-M-r command-prompt -p "rename session:" "rename-session '%%'"
bind-key -n C-M-c new-session
bind-key -n C-M-x confirm-before -p "really kill session?" kill-session
# bind-key -n C-M-l choose-session # choose session from list

# window management
set -g allow-rename off # disable auto renaming windows and panes
set -g automatic-rename off # disable auto renaming windows and panes
set -g renumber-windows off # disable window reordering

set -g base-index 1
bind -n C-p previous-window    # switch to prev window
bind -n C-n next-window        # switch to next window
bind-key w new-window -a -t :$ -n " " # create a new window with default name
bind-key b choose-window  # choose window from list
bind-key C-x kill-window  # close the current window
bind-key r command-prompt -I "#{window_name}" -p "rename window:" "rename-window '%%'"
set-window-option -g window-status-activity-style ''  # disable highlights on events
set-window-option -g window-status-bell-style ''      # disable highlights on events
# set -g window-status-current-format "#[fg=#504945,bg=default]#[fg=#bdae93,bg=#504945,nobold]#W#{?window_zoomed_flag, 󰍉 ,}#[fg=#504945,bg=default,nobold] "
# set -g window-status-format " #[fg=#a89984,bg=default]#W#{?window_zoomed_flag, 󰍉 ,}  "

# set -g window-status-current-format " #[fg=#fbf1c7,bg=default,nobold]#W#{?window_zoomed_flag, 󰍉 ,} "
# set -g window-status-format " #[fg=#a89984,bg=default]#W#{?window_zoomed_flag, 󰍉 ,} "
# set -g window-status-separator ""

# set -g window-status-current-format " #[fg=#fbf1c7,bg=default,nobold]#I:#W#{?window_zoomed_flag, 󰍉 ,}  "
# set -g window-status-format " #[fg=#a89984,bg=default]#I:#W#{?window_zoomed_flag, 󰍉 ,}  "

set -g window-status-current-format " #[fg=#fbf1c7,bg=default,nobold]#W#{?window_zoomed_flag, 󰍉 ,}  "
set -g window-status-format " #[fg=#a89984,bg=default]#W#{?window_zoomed_flag, 󰍉 ,}  "
set -g window-status-separator ""

# pane management
setw -g pane-base-index 1  # start pane numbering from 1 instead of 0
setw -g aggressive-resize on
bind-key -n C-Left resize-pane -L 1   # resize pane
bind-key -n C-Right resize-pane -R 1  # resize pane
bind-key -n C-Up resize-pane -U 1     # resize pane
bind-key -n C-Down resize-pane -D 1   # resize pane
bind-key j select-pane -D  # select pane below
bind-key k select-pane -U  # select pane above
bind-key l select-pane -R  # select pane on the right
bind-key h select-pane -L  # select pane on the left
bind-key v split-window -h -c "#{pane_current_path}"\; select-layout -E
bind-key s split-window -c "#{pane_current_path}"\; select-layout -E
bind-key f run-shell "tmux resize-pane -Z"  # zoom into pane
bind-key S-Right swap-pane -D # move pane down
bind-key S-Left swap-pane -U # move pane up
bind-key x confirm-before -p "kill this pane? (y/n)" kill-pane
bind-key C-g break-pane -a -d # break pane into new window
bind-key t command-prompt -p "window number to join:" "join-pane -s '%%'"
bind-key 1 setw synchronize-panes # toggle synchronizing input between panes
set -g display-panes-time 5000 # time (in milliseconds) that pane numbers stay visible

# Set pane border colors
set -g pane-active-border-style "fg=#504945" # gruvbox bg3 (inactive)
set -g pane-border-style "fg=#504945"        # gruvbox bg3 (inactive)
set -g pane-border-format "#{?pane_active,#[fg=#b8bb26],#[fg=#a89984]}"
#                                              gruvbox green  gruvbox gray

# auto hide pane-border-status line when only one pane is displayed (see tmux/tmux#566)
set-hook -g 'after-new-window'   'run-shell -b "if [ \#{window_panes} -eq 1 ]; then tmux set pane-border-status off; fi"'
set-hook -g 'after-kill-pane'    'run-shell -b "if [ \#{window_panes} -eq 1 ]; then tmux set pane-border-status off; fi"'
set-hook -g 'pane-exited'        'run-shell -b "if [ \#{window_panes} -eq 1 ]; then tmux set pane-border-status off; fi"'
set-hook -g 'after-split-window' 'run-shell -b "if [ \#{window_panes} -gt 1 ]; then tmux set pane-border-status bottom; fi"'

# bar
set -g status-right ""
set-option -g status-fg "#a89984" # gruvbox fg4 (muted foreground)
set-option -g status-bg "default" # gruvbox bg0 (main background)
set-option -g status-justify left
set-option -g status-position bottom
set-option -g status-interval 1
set -g status-right-length 100
set -g status-right "#[fg=#bdae93,bg=default,nobold] 󱏒  #S #[fg=#1d2021,bg=default,nobold]#[default]"
set -g status-left ""
#                                                       gruvbox red             bg0

# tmux-fzf config
TMUX_FZF_MENU_POPUP_WIDTH=60%
TMUX_FZF_MENU_POPUP_HEIGHT=30%
TMUX_FZF_LAUNCH_KEY="C-f"
TMUX_FZF_PREVIEW=1
TMUX_FZF_ORDER="pane|window|session"
TMUX_FZF_PANE_FORMAT="#{window_name} #{pane_name}"
TMUX_FZF_SESSION_FORMAT=""
TMUX_FZF_SWITCH_CURRENT=1
TMUX_FZF_OPTIONS="-p -w 62% -h 38% -m --exit-0 --bind one:accept" # auto select if only one candidate available
bind-key -n C-M-l run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/session.sh switch"
bind-key M-o run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/pane.sh switch"

# tmux-pad scratchpad config
# simple scratchpad
set -g @tpad-scratchpad-bind   "F1"
set -g @tpad-scratchpad-opts   "status on"
set -g @tpad-scratchpad-dir    "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm' # tmux plugin manager
set -g @plugin 'sainnhe/tmux-fzf' # fzf magic
set -g @plugin 'Subbeh/tmux-tpad' # toggle scratchpad

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

