conky.config = {
    background = true,
    double_buffer = true,
    own_window = true,
    own_window_type = 'normal',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_hints = 'undecorated,sticky,skip_taskbar,skip_pager',
    own_window_class = 'Conky',
    own_window_title = 'Conky',
    alignment = 'middle_right',
    gap_x = 25,
    gap_y = 50,
    update_interval = 5.0,
    default_color = 'ffffff',
};

conky.text = [==[
KUBERNETES:
Context: ${execpi 5 kubectl config current-context 2>/dev/null || echo "N/A"}
NS:      ${execpi 5 kubectl config view --minify -o jsonpath='{.contexts[0].context.namespace}' 2>/dev/null || echo "N/A"}

PODS:
Running:     ${execpi 10 kubectl get pods -A --field-selector=status.phase=Running --no-headers 2>/dev/null | wc -l}
Pending:     ${execpi 10 kubectl get pods -A --field-selector=status.phase=Pending --no-headers 2>/dev/null | wc -l}
Failed:      ${execpi 10 kubectl get pods -A --field-selector=status.phase=Failed --no-headers 2>/dev/null | wc -l}
CrashLoop:   ${execpi 10 kubectl get pods -A --no-headers 2>/dev/null | grep -c CrashLoopBackOff}
OOMKilled:   ${execpi 10 kubectl get pods -A --no-headers 2>/dev/null | grep -c OOMKilled}
Evicted:     ${execpi 10 kubectl get pods -A --no-headers 2>/dev/null | grep -c Evicted}
Terminating: ${execpi 10 kubectl get pods -A --no-headers 2>/dev/null | grep -c Terminating}
ImagePull:   ${execpi 10 kubectl get pods -A --no-headers 2>/dev/null | grep -c ErrImagePull}

DEPLOYMENTS:
Total:       ${execpi 15 kubectl get deploy -A --no-headers 2>/dev/null | wc -l}
Unavailable: ${execpi 15 kubectl get deploy -A --no-headers 2>/dev/null | awk '$5 != $4 {print}' | wc -l}

NODES:
Ready:       ${execpi 30 kubectl get nodes --no-headers 2>/dev/null | grep -c " Ready"}
NotReady:    ${execpi 30 kubectl get nodes --no-headers 2>/dev/null | grep -c "NotReady"}

FAILED JOBS:
${execpi 15 kubectl get jobs -A --no-headers 2>/dev/null | awk '$3 == 0 {printf "%-20s %s\n", $1, $2}' | head -10}

PDBS:
Disrupted:   ${execpi 15 kubectl get pdb -A --no-headers 2>/dev/null | awk '$5 < $4 {print}' | wc -l}
Total:       ${execpi 15 kubectl get pdb -A --no-headers 2>/dev/null | wc -l}

TOP CPU PODS:
${execpi 15 kubectl top pods -A --no-headers 2>/dev/null | sort -k3 -rn | head -5 | awk '{printf "%-30s %s\n", $2, $3}'}

TOP RAM PODS:
${execpi 15 kubectl top pods -A --no-headers 2>/dev/null | sort -k4 -rn | head -5 | awk '{printf "%-30s %s\n", $2, $4}'}

HIGH MEM REQUESTS:
${execpi 15 kubectl get pods -A -o json 2>/dev/null | jq -r '.items[] | "\(.metadata.namespace) \(.metadata.name) \(.spec.containers[0].resources.requests.memory // "N/A")"' | sort -k3 -rh | head -5 | awk '{printf "%-25s %s\n", $2, $3}'}
]==];
