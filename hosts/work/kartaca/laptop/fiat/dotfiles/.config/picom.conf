backend = "glx";
vsync = true;

corner-radius = 10;

use-damage = true;
xrender-sync-fence = true;

unredir-if-possible = true;

# -------------------------
# Blur
# -------------------------
blur-method = "dual_kawase";
blur-strength = 10;
blur-background = true;

# -------------------------
# Fading (kept, but controlled)
# -------------------------
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;

# IMPORTANT: exclude dmenu from fading
fade-exclude = [
  "class_g = 'dmenu'",
  "class_i = 'dmenu'"
];

# -------------------------
# Shadows
# -------------------------
shadow = false;
shadow-radius = 15;
shadow-offset-x = -15;
shadow-offset-y = -15;

# -------------------------
# Window rules
# -------------------------
rules = (
  {
    match = "class_g = 'dwm' || window_type = 'dock'";
    corner-radius = 0;
    opacity = 1;
    shadow = true;
  },

  {
    match = "class_g = 'dmenu' || class_i = 'dmenu'";
    corner-radius = 0;
    opacity = 1;
    shadow = false;

    # harmless safety (depends on fork, ignored if unsupported)
    animations = false;
  },

  {
    match = "class_g = 'qutebrowser'";
    opacity = 1;
    blur-background = false;
  },

  {
    match = "class_g = 'Dunst'";
    shadow = true;
  }
);

# -------------------------
# Animations (modern tuned set)
# -------------------------
animations = (

  # -------------------------
  # OPEN / SHOW
  # -------------------------
  {
    triggers = ["open", "show"];
    d = 0.16;

    scale-x = {
      duration = "d";
      start = 0.96;
      end = 1;
      curve = "cubic-bezier(0.25, 0.8, 0.25, 1)";
    };

    scale-y = {
      duration = "d";
      start = 0.96;
      end = 1;
      curve = "cubic-bezier(0.25, 0.8, 0.25, 1)";
    };

    offset-y = {
      duration = "d";
      start = 6;
      end = 0;
      curve = "cubic-bezier(0.25, 0.8, 0.25, 1)";
    };

    opacity = {
      duration = "d";
      start = 0;
      end = 1;
      curve = "linear";
    };
  },

  # -------------------------
  # CLOSE / HIDE
  # -------------------------
  {
    triggers = ["close", "hide"];
    d = 0.18;

    scale-x = {
      duration = "d";
      start = 1;
      end = 0.98;
      curve = "cubic-bezier(0.4, 0, 1, 1)";
    };

    scale-y = {
      duration = "d";
      start = 1;
      end = 0.98;
      curve = "cubic-bezier(0.4, 0, 1, 1)";
    };

    offset-y = {
      duration = "d";
      start = 0;
      end = 6;
      curve = "cubic-bezier(0.4, 0, 1, 1)";
    };

    opacity = {
      duration = "d";
      start = 1;
      end = 0;
      curve = "linear";
    };
  },

  # -------------------------
  # GEOMETRY (move/resize)
  # -------------------------
  {
    triggers = ["geometry"];
    d = 0.22;

    offset-x = {
      duration = "d";
      start = "window-x-before - window-x";
      end = 0;
      curve = "cubic-bezier(0.25, 0.8, 0.25, 1)";
    };

    offset-y = {
      duration = "d";
      start = "window-y-before - window-y";
      end = 0;
      curve = "cubic-bezier(0.25, 0.8, 0.25, 1)";
    };

    # IMPORTANT: avoid resize distortion
    scale-x = {
      duration = "d";
      start = 1;
      end = 1;
      curve = "linear";
    };

    scale-y = {
      duration = "d";
      start = 1;
      end = 1;
      curve = "linear";
    };
  }
);
