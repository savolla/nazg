add_newline = false

# A minimal left prompt
format = """$directory\n$os$username$hostname """

# move the rest of the prompt to the right
right_format = """$git_branch$git_status$all$status$kubernetes $gcloud"""

[username]
style_user = 'white bold'
style_root = 'black bold'
format = '[ $user@]($style)'
disabled = false
show_always = true

[hostname]
ssh_only = false
style = 'white bold'
format = '[$hostname]($style)'
disabled = false

[character]
disabled = true
success_symbol = "[‚ĚĮ](green)"
error_symbol = "[‚ĚĮ](red)"
vicmd_symbol = "[‚Ěģ](yellow)"

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
style = 'green'

[python]
# format = '[(\($virtualenv\) )]($style)'
# style = 'white'
symbol = 'ÓąĶ '
format = '[${symbol} ${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "#9dc847"

[terraform]
# format = '[(\($virtualenv\) )]($style)'
# style = 'white'
symbol = 'Óöö '
format = '[${symbol} ${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "#8787ff"

[git_status]
format = '$all_status$ahead_behind '
ahead = '[Ôźä $count](bold #ff00ff) '
behind = '[ÔźČ $count](bold #ff00ff) '
staged = '[ÔĀß $count](#00c310) '
deleted = '[‚úĖ$count](#e10051) '
renamed = '[ÔĎö $count](#d100d8) '
stashed = '[Ółõ $count](#d74b14) '
untracked = '[ÔĄ® $count](#ffffff) '
modified = '[ÔĀ© $count](#14ced7) '
conflicted = '[ÔĀĪ  $count](#ff0000) '
diverged = 'Ôāü '
up_to_date = ''

[directory]
format = '[$read_only]($read_only_style) [$path]($style) '
style = "#00d7d7"
fish_style_pwd_dir_length = 999
read_only = 'ůįĆĺ '

[cmd_duration]
format = '[$duration]($style) '

[line_break]
disabled = false

[status]
disabled = false
symbol = '‚úė '

[gcloud]
symbol = '[ůĪá∂ ](#f3b605) '
format = '[$symbol($project) ($region)](#f3b605) '
[gcloud.project_aliases]
hopi-pretest-kartaca = 'hopi-pret'
hopi-program-test = 'hopi-test'
hopi-program-staging = 'hopi-stag'
hopi-program = 'hopi-prod'
[gcloud.region_aliases]
europe-west1 = 'ūüáßūüá™'

[nix_shell]
format = '[$symbol$state( \($name\))]($style) '
symbol = 'Ôčú '

[kubernetes]
disabled = false
symbol = '[ůį†≥ ](#6dbaff)'
format = '[$symbol](bright-black) [$context(\($namespace\))]($style)'

[[kubernetes.contexts]]
context_pattern = "hopi-prod"
