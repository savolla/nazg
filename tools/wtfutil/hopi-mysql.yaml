wtf:
  colors:
    border:
      focusable: darkslateblue
      focused: yellow
      normal: gray
  grid:
    columns: [69, 69, 69]
    rows: [17, 12, 4, 7, 10, 40, 20, 20, 40, 40]
  refreshInterval: 1
  openFileUtil: "xdg-open"

  # --- YAML ANCHORS ---
  # Define default widget behaviors here
  .widget_defaults: &widget_defaults
    enabled: true
    border: true
    type: cmdrunner

  .theme_test: &theme_test
    title: blue
    border: { focusable: blue }

  .theme_stag: &theme_stag
    title: orange
    border: { focusable: orange }

  .theme_prod: &theme_prod
    title: red
    border: { focusable: red }

  mods:
    # TEST
    mysql_test_status:
      <<: *widget_defaults
      title: "MYSQL STATUS"
      colors: *theme_test
      type: cmdrunner
      enabled: true
      border: true
      refreshInterval: 60
      position: { top: 0, left: 0, height: 1, width: 1 }
      cmd: "./scripts/mysql_status.sh"
      args: [
        "sednawireless",
        "10.36.32.3",
        "zvRXqVvELkRWQHesoTNWYnty4X6oU7z7"
      ]

    mysql_test_active_queries:
      <<: *widget_defaults
      title: "SLOW / STUCK QUERIES"
      colors: *theme_test
      type: cmdrunner
      enabled: true
      border: true
      refreshInterval: 60
      position: { top: 1, left: 0, height: 1, width: 1 }
      cmd: "./scripts/mysql_active_queries.sh"
      args: [
        "sednawireless",
        "10.36.32.3",
        "zvRXqVvELkRWQHesoTNWYnty4X6oU7z7"
      ]

    mysql_test_replication_lag:
      <<: *widget_defaults
      title: "REPLICATION LAG"
      colors: *theme_test
      type: cmdrunner
      enabled: true
      border: true
      refreshInterval: 60
      position: { top: 2, left: 0, height: 1, width: 1 }
      cmd: "./scripts/mysql_replication_lag.sh"
      args: [
        "sednawireless",
        "10.36.32.3",
        "zvRXqVvELkRWQHesoTNWYnty4X6oU7z7"
      ]

    # mysql_test_innodb_lock_contention:
