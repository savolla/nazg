wtf:
  colors:
    border:
      focusable: darkslateblue
      focused: yellow
      normal: gray
  grid:
    columns: [69, 69, 69]
    rows: [10, 15, 15, 40, 40, 40, 20, 20, 40, 40]
  refreshInterval: 1
  openFileUtil: "xdg-open"

  # --- YAML ANCHORS ---
  # Define default widget behaviors here
  .widget_defaults: &widget_defaults
    enabled: true
    border: true
    type: cmdrunner

  .theme_test: &theme_test
    title: blue
    border: { focusable: blue }

  .theme_stag: &theme_stag
    title: orange
    border: { focusable: orange }

  .theme_prod: &theme_prod
    title: red
    border: { focusable: red }

  mods:
    #### TEST ENV (Left: 0) ######################################
    k8s_test_overview:
      <<: *widget_defaults
      title: "TEST OVERVIEW"
      colors: *theme_test
      refreshInterval: 60
      position: { top: 0, left: 0, height: 1, width: 1 }
      cmd: "./scripts/k8s_overview.sh"
      args: [
        "hopi-test", # k8s context
        "bird.test.kartaca.com" # ssl to check
      ]

    k8s_test_restarts:
      <<: *widget_defaults
      title: "RESTARTED PODS"
      colors: *theme_test
      refreshInterval: 30
      position: { top: 1, left: 0, height: 1, width: 1 }
      cmd: "./scripts/k8s_restarted_pods.sh"
      args: ["hopi-test"]

    k8s_test_problematic_pods:
      <<: *widget_defaults
      title: "PROBLEMATIC PODS"
      colors: *theme_test
      refreshInterval: 10
      position: { top: 2, left: 0, height: 1, width: 1 }
      cmd: "./scripts/k8s_problematic_pods.sh"
      args: ["hopi-test"]

    k8s_test_service_versions:
      <<: *widget_defaults
      title: "SERVICE VERSIONS"
      colors: *theme_test
      refreshInterval: 900
      position: { top: 3, left: 0, height: 1, width: 1 }
      cmd: "./scripts/k8s_service_versions.sh"
      args: ["hopi-test"]

    k8s_test_deploy_resources:
      <<: *widget_defaults
      title: "DEPLOYMENT REPLICAS/RESOURCES"
      colors: *theme_test
      refreshInterval: 900
      position: { top: 4, left: 0, height: 1, width: 1 }
      cmd: "./scripts/k8s_deployment_resources.sh"
      args: ["hopi-test"]

    k8s_test_cronjob_health:
      <<: *widget_defaults
      title: "CRONJOB HEALTH"
      colors: *theme_test
      refreshInterval: 60
      position: { top: 5, left: 0, height: 1, width: 1 }
      cmd: "./scripts/k8s_cronjob_health.sh"
      args: ["hopi-test"]

    k8s_test_top_5_resource_hungry_pods:
      <<: *widget_defaults
      title: "TOP 5 RESOURCE HUNGRY PODS"
      colors: *theme_test
      refreshInterval: 60
      position: { top: 6, left: 0, height: 1, width: 1 }
      cmd: "./scripts/k8s_top_5_resource_hungry_pods.sh"
      args: ["hopi-test"]

    k8s_test_struggling_pods:
      <<: *widget_defaults
      title: "TOP 5 RESOURCE HUNGRY PODS"
      colors: *theme_test
      refreshInterval: 60
      position: { top: 7, left: 0, height: 1, width: 1 }
      cmd: "./scripts/k8s_struggling_pods.sh"
