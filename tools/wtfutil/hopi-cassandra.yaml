      type: cmdrunner
      enabled: true
      border: true
      refreshInterval: 300
      position: { top: 2, left: 1, height: 1, width: 1 }
      cmd: "./scripts/hopi-cassandra-health.sh"
      args: [
        "inbloom",
        "monitorRole",
        "91jAPSTEW12dd2QQss5gc"
      ]


    # PROD
    cassandra_prod_ring:
      <<: *widget_defaults
      title: "CLUSTER RING STATUS"
      colors: *theme_prod
      type: cmdrunner
      enabled: true
      border: true
      refreshInterval: 60
      position: { top: 0, left: 2, height: 1, width: 1 }
      cmd: "./scripts/hopi-cassandra-ring.sh"
      args: [
        "backchat",
        "monitorRole",
        "VxqtEn2WKfSMNqVxKNyKcj426qFvdV6e"
      ]

    cassandra_prod_dropped:
